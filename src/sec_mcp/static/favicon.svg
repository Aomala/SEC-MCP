<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Fineas.ai Favicon — Bold F + ascending arrow
    Reads clearly at 16px
  -->
  <defs>
    <linearGradient id="fg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0f1e"/>
  <!-- Bold F -->
  <rect x="7" y="6" width="4" height="20" rx="1" fill="url(#fg)"/>
  <rect x="11" y="6" width="14" height="4" rx="1" fill="url(#fg)"/>
  <rect x="11" y="14" width="10" height="3.5" rx="1" fill="#06b6d4"/>
  <!-- Arrow breaking through -->
  <polyline points="13,24 18,16 21,18.5 25,9" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="25" cy="9" r="1.5" fill="#fff"/>
</svg>
