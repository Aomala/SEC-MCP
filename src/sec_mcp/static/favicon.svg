<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Fineas.ai Favicon
    Simplified mark: rounded square with three ascending bars + trend line.
    Optimized for 16x16 rendering — minimal detail, maximum clarity.
  -->
  <rect width="32" height="32" rx="6" fill="#0a0f1e"/>

  <!-- Three ascending bars -->
  <rect x="6" y="20" width="5" height="7" rx="1" fill="#6366f1"/>
  <rect x="13" y="14" width="5" height="13" rx="1" fill="#6366f1"/>
  <rect x="20" y="8" width="5" height="19" rx="1" fill="#6366f1"/>

  <!-- Trend line -->
  <polyline
    points="8,19 16,13 23,7"
    fill="none"
    stroke="#ffffff"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>