# Railway deployment configuration for Fineas.ai
# App reads PORT from environment (Railway sets this automatically)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
startCommand = "python -m sec_mcp.chat_app"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
